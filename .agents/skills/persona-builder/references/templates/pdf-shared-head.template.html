<!--
  PDF SHARED HEAD — passed as `shared_head` to mcp__plugin_pika_pika__html_to_pdf.
  This file is the <head> injected into EVERY page. ALL load-bearing layout CSS lives
  here exactly once; the per-page body fragments are markup-only and reference these
  classes. Do NOT re-author grid math, paddings, page size, or column widths in the
  skill — they are battle-tested here and prevent off-page bleed and the empty 13th page.

  HOW TO FILL (deterministic — no CSS authoring needed):
    {{FONT_IMPORT}}   one Google Fonts <link> for the display+body pair (omit line if system fonts)
    {{FONT_DISPLAY}}  display font-family stack, e.g. "Playfair Display", serif
    {{FONT_BODY}}     body font-family stack, e.g. "Inter", sans-serif
    {{BG}}            page background tone, hex
    {{FG}}            primary text color, hex
    {{ACCENT}}        accent color for numbers / labels / rules, hex
    {{MUTED}}         muted gray for secondary text, hex

  These vars are consumed by every body template via var(--fg) etc. Fill once here.

  PAGE TYPES served by these classes (one body fragment file each):
    .cover            pdf-cover.template.html
    .about            pdf-about.template.html
    .moodboard        pdf-moodboard.template.html
    .categories       pdf-content-categories.template.html
    .voice            pdf-voice-mode.template.html   (reused for all 5 voice modes)
    .hooks            pdf-hooks-dm.template.html
    .dodont           pdf-do-dont.template.html
    .next             pdf-next-steps.template.html
-->
<meta charset="utf-8">
{{FONT_IMPORT}}
<style>
  :root {
    --font-display: {{FONT_DISPLAY}};
    --font-body: {{FONT_BODY}};
    --bg: {{BG}};
    --fg: {{FG}};
    --accent: {{ACCENT}};
    --muted: {{MUTED}};
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; }
  body {
    font-family: var(--font-body);
    color: var(--fg);
    background: var(--bg);
  }

  /* Exact PDF frame — every page is one 1920x1080 sheet, no margin. */
  @page { size: 1920px 1080px; margin: 0; }
  .page {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }

  /* ---------- shared text atoms ---------- */
  .eyebrow {
    font-size: 18px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .page-title {
    font-family: var(--font-display);
    font-size: 72px;
    line-height: 1;
    color: var(--fg);
  }
  .lede { font-size: 26px; line-height: 1.55; color: var(--fg); }
  .muted { color: var(--muted); }

  /* ================= COVER ================= */
  .cover { padding: 0; }
  .cover .hero {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: 50% 40%;
    background-repeat: no-repeat;
  }
  .cover .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.55) 100%);
  }
  .cover .copy {
    position: absolute;
    left: 120px; right: 120px; bottom: 110px;
    color: #fff;
  }
  .cover .copy .eyebrow { color: rgba(255,255,255,0.82); }
  .cover .name {
    font-family: var(--font-display);
    /* Clamp + nowrap keeps long handles on one line inside the cover frame. */
    font-size: clamp(96pt, 8vw, 160pt);
    line-height: 0.92;
    margin: 18px 0 24px;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cover .tagline {
    font-size: 22px;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
  }

  /* ================= ABOUT ================= */
  .about {
    display: grid;
    grid-template-columns: 1040px 1fr;
    gap: 80px;
    padding: 120px;
    align-items: start;
  }
  .about .body .page-title { margin-bottom: 40px; }
  .about .body .prose p { font-size: 26px; line-height: 1.6; margin-bottom: 24px; }
  .about .stats {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px 48px;
  }
  .about .stat .k {
    font-size: 15px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .about .stat .v { font-size: 28px; color: var(--fg); }
  .about .side {
    display: grid;
    grid-auto-rows: 1fr;
    gap: 24px;
    height: 840px;
  }
  .about .side .tile {
    width: 100%; height: 100%;
    background-size: cover; background-position: 50% 50%; background-repeat: no-repeat;
    border-radius: 4px;
  }

  /* ================= MOODBOARD (full bleed) ================= */
  .moodboard { padding: 0; }
  .moodboard img {
    display: block;
    width: 1920px; height: 1080px;
    object-fit: cover;
  }

  /* ================= CONTENT CATEGORIES ================= */
  .categories { padding: 70px 120px; }
  .categories .page-title { margin-bottom: 24px; }
  .categories .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 24px 48px;
    height: 824px;
  }
  .categories .card {
    display: grid;
    grid-template-columns: 300px 1fr;   /* fixed 300px image rail + text */
    gap: 36px;
    align-items: start;
  }
  .categories .card .img {
    width: 300px; height: 400px;        /* fixed 300x400 image */
    background-size: cover;
    background-position: 50% 50%;        /* overridden per-card via {{CARD_N_POS}} */
    background-repeat: no-repeat;
    border-radius: 4px;
  }
  .categories .card .name {
    font-family: var(--font-display);
    font-size: 38px; line-height: 1.05; color: var(--fg);
    margin-bottom: 14px;
  }
  .categories .card .desc { font-size: 20px; line-height: 1.45; color: var(--muted); margin-bottom: 20px; }
  .categories .card ul { list-style: none; }
  .categories .card li {
    font-size: 19px; line-height: 1.5; color: var(--fg);
    padding-left: 22px; position: relative;
  }
  .categories .card li::before {
    content: ""; position: absolute; left: 0; top: 13px;
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }

  /* ================= VOICE MODE (reused x5) ================= */
  /* Load-bearing padded layout: 80px padding, 800 / 160 gap / 800 columns,
     right grid 800x920 with 16px gap, tiles fill cells. VERBATIM — do not change. */
  .voice {
    padding: 80px;
    display: grid;
    grid-template-columns: 800px 160px 800px;
    align-items: center;
  }
  .voice .left { grid-column: 1; align-self: start; padding-top: 12px; }
  .voice .mode-name {
    font-family: var(--font-display);
    font-size: 84px; line-height: 0.98; color: var(--fg);
    margin: 16px 0 36px;
  }
  .voice .usewhen-label {
    font-size: 15px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  .voice .usewhen { font-size: 26px; line-height: 1.5; color: var(--fg); margin-bottom: 48px; }
  .voice .captions-label {
    font-size: 15px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  .voice .caption {
    font-size: 22px; line-height: 1.5; color: var(--fg);
    padding: 18px 22px; margin-bottom: 16px;
    border-left: 3px solid var(--accent);
    background: rgba(0,0,0,0.03);
  }
  .voice .grid {
    grid-column: 3;
    width: 800px; height: 920px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
  }
  .voice .grid .tile {
    width: 100%; height: 100%;
    background-size: cover;
    background-position: 50% 50%;
    background-repeat: no-repeat;
    border-radius: 4px;
  }

  /* ================= HOOKS + DM ================= */
  .hooks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 96px;
    padding: 100px 120px;
  }
  .hooks .col-title {
    font-family: var(--font-display);
    font-size: 48px; line-height: 1; color: var(--fg); margin-bottom: 40px;
  }
  .hooks ol { list-style: none; counter-reset: hk; }
  .hooks ol li {
    counter-increment: hk;
    font-size: 26px; line-height: 1.45; color: var(--fg);
    padding-left: 62px; position: relative; margin-bottom: 28px;
  }
  .hooks ol li::before {
    content: counter(hk); position: absolute; left: 0; top: 2px;
    font-family: var(--font-display); font-size: 30px; color: var(--accent);
  }
  .hooks .dm { margin-bottom: 28px; }
  .hooks .dm .who {
    font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .hooks .dm .msg {
    font-size: 24px; line-height: 1.45; color: var(--fg);
    padding: 18px 22px; border-radius: 14px; background: rgba(0,0,0,0.04);
  }

  /* ================= DO / DON'T ================= */
  .dodont {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 96px;
    padding: 110px 120px;
  }
  .dodont .col-title {
    font-family: var(--font-display);
    font-size: 56px; line-height: 1; margin-bottom: 44px;
  }
  .dodont .do .col-title { color: var(--fg); }
  .dodont .dont .col-title { color: var(--muted); }
  .dodont ul { list-style: none; }
  .dodont li {
    font-size: 26px; line-height: 1.4; color: var(--fg);
    padding: 0 0 26px 50px; position: relative;
  }
  .dodont .do li::before {
    content: "✓"; position: absolute; left: 0; top: 0;
    font-size: 28px; color: var(--accent);
  }
  .dodont .dont li::before {
    content: "✕"; position: absolute; left: 0; top: 0;
    font-size: 26px; color: var(--muted);
  }

  /* ================= NEXT STEPS (roadmap) ================= */
  /* Load-bearing: header h1 72px, .next padding 80px 120px 70px,
     .next-grid height 720px / rows 1fr 1fr 1fr / gap 28px 56px. VERBATIM —
     these exact numbers keep 6 cards on one page and prevent the empty 13th page. */
  .next {
    padding: 80px 120px 70px;
    display: flex;
    flex-direction: column;
  }
  .next h1 {
    font-family: var(--font-display);
    font-size: 72px;
    line-height: 1;
    color: var(--fg);
    margin-bottom: 14px;
  }
  .next .sub { font-size: 22px; color: var(--muted); margin-bottom: 44px; }
  .next-grid {
    height: 720px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 28px 56px;
  }
  .next-grid .card {
    display: flex; flex-direction: column;
    padding-left: 28px; border-left: 3px solid var(--accent);
  }
  .next-grid .card .num {
    font-family: var(--font-display);
    font-size: 30px; color: var(--accent); margin-bottom: 6px;
  }
  .next-grid .card .label {
    font-size: 14px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  .next-grid .card .headline {
    font-family: var(--font-display);
    font-size: 30px; line-height: 1.1; color: var(--fg); margin-bottom: 10px;
  }
  .next-grid .card .text { font-size: 19px; line-height: 1.4; color: var(--fg); }
</style>
